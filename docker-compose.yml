services:
  ac-cost-exporter:
    build: .
    container_name: ac-cost-exporter
    restart: unless-stopped
    ports:
      - "9212:9212"
    env_file:
      - .env                  # carga ESIOS_TOKEN desde el fichero .env
    environment:
      # Descuento Bono Social — puedes sobreescribirlo en schedule.json por día
      # 2026: 42.5% (vulnerable) / 57.5% (vulnerable severo)
      # 2027: 35% / 50% salvo prórroga
      - BONO_SOCIAL_PCT=42.5
      - CONFIG_FILE=/config/schedule.json
      - EXPORTER_PORT=9212
    volumes:
      - /DATA/AppData/ac-cost-exporter/config:/config
    networks:
      - observatorio_default

networks:
  observatorio_default:
    external: true
